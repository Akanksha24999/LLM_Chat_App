name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r app/requirements.txt
    - name: Run tests
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        DB_USER: ${{ secrets.DB_USER }}
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        DB_NAME: ${{ secrets.DB_NAME }}
        DATABASE_URL: sqlite:///./test.db
        REDIS_URL: redis://localhost:6379/0
      run: |
        python -m pytest app/test_main.py

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      repo_lower: ${{ steps.repo_name.outputs.lower }}
    steps:
    - uses: actions/checkout@v3
    
    - name: Set lowercase repo name
      id: repo_name
      run: |
        echo "lower=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Backend
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ghcr.io/${{ steps.repo_name.outputs.lower }}/backend:latest

    - name: Build and push Nginx
      uses: docker/build-push-action@v4
      with:
        context: .
        file: Dockerfile.nginx
        push: true
        tags: ghcr.io/${{ steps.repo_name.outputs.lower }}/nginx:latest

