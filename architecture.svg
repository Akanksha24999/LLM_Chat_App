<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" />
  
  <!-- Styles -->
  <style>
    .box { stroke: #334155; stroke-width: 2; fill: #ffffff; rx: 8; ry: 8; }
    .text { font-family: 'Inter', sans-serif, Arial; font-size: 14px; fill: #1e293b; font-weight: 500; }
    .header { font-family: 'Inter', sans-serif, Arial; font-size: 18px; fill: #0f172a; font-weight: 700; }
    .arrow { stroke: #3b82f6; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .sub-text { font-size: 12px; fill: #64748b; }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6" />
    </marker>
  </defs>

  <text x="400" y="40" text-anchor="middle" class="header">AI Career Guide - Architecture</text>

  <!-- Layers -->
  <!-- User Layer -->
  <rect x="50" y="250" width="120" height="60" class="box" />
  <text x="110" y="280" text-anchor="middle" class="text">User Browser</text>
  <text x="110" y="300" text-anchor="middle" class="sub-text">Frontend (JS)</text>

  <!-- Proxy Layer -->
  <rect x="250" y="250" width="120" height="60" class="box" stroke-dasharray="4" />
  <text x="310" y="280" text-anchor="middle" class="text">Nginx</text>
  <text x="310" y="300" text-anchor="middle" class="sub-text">Reverse Proxy</text>

  <!-- Application Layer -->
  <rect x="450" y="250" width="150" height="80" class="box" fill="#eff6ff" stroke="#3b82f6" />
  <text x="525" y="290" text-anchor="middle" class="text">FastAPI Backend</text>
  <text x="525" y="315" text-anchor="middle" class="sub-text">WebSockets / Logic</text>

  <!-- External AI -->
  <rect x="650" y="100" width="130" height="60" class="box" stroke="#8b5cf6" />
  <text x="715" y="130" text-anchor="middle" class="text">Gemini AI</text>
  <text x="715" y="150" text-anchor="middle" class="sub-text">External API</text>

  <!-- Database Layer -->
  <rect x="450" y="450" width="120" height="60" class="box" />
  <text x="510" y="480" text-anchor="middle" class="text">PostgreSQL</text>
  <text x="510" y="500" text-anchor="middle" class="sub-text">Chat Logs</text>

  <!-- Cache/Health -->
  <rect x="620" y="450" width="120" height="60" class="box" />
  <text x="680" y="480" text-anchor="middle" class="text">Redis</text>
  <text x="680" y="500" text-anchor="middle" class="sub-text">State / Health</text>

  <!-- Monitoring -->
  <rect x="650" y="250" width="130" height="60" class="box" stroke="#f59e0b" />
  <text x="715" y="280" text-anchor="middle" class="text">Prometheus</text>
  <text x="715" y="300" text-anchor="middle" class="sub-text">Metrics</text>

  <!-- Arrows -->
  <line x1="170" y1="280" x2="240" y2="280" class="arrow" />
  <line x1="370" y1="280" x2="440" y2="280" class="arrow" />
  
  <!-- FastAPI to Others -->
  <path d="M 525 250 L 525 130 L 640 130" class="arrow" />
  <line x1="510" y1="330" x2="510" y2="440" class="arrow" />
  <path d="M 550 330 L 550 400 L 680 400 L 680 440" class="arrow" />
  <line x1="600" y1="280" x2="640" y2="280" class="arrow" />

  <!-- Labels -->
  <text x="205" y="270" text-anchor="middle" class="sub-text">HTTP/WS</text>
  <text x="580" y="120" text-anchor="middle" class="sub-text">API Call</text>
  <text x="480" y="380" text-anchor="middle" class="sub-text">SQL</text>
  <text x="620" y="270" text-anchor="middle" class="sub-text">Scrape</text>

</svg>